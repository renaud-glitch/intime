<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mon Journal Intime</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg: #0a0812; --surface: #110f1a; --surface2: #1a1628;
            --border: rgba(255,255,255,0.07); --text: #f2eaf8;
            --text-dim: #7a6e8a; --rose: #dc5078; --nav-w: 72px;
        }

        /* LIBÉRATION DU SCROLL */
        html, body {
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            overflow-y: auto !important; /* Force le scroll vertical */
        }

        body { display: flex; }

        .nav {
            width: var(--nav-w); background: var(--surface); border-right: 1px solid var(--border);
            position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }

        .main {
            flex: 1; margin-left: var(--nav-w); padding: 20px 18px 120px;
            min-height: 100vh; position: relative;
        }

        .tab {
            width: 52px; height: 52px; background: transparent; border: none; color: var(--text-dim);
            border-radius: 14px; cursor: pointer; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .tab.active { background: rgba(220,80,120,0.2); color: #f07898; border: 1px solid rgba(220,80,120,0.3); }
        .tab-label { font-size: 0.5rem; text-transform: uppercase; margin-top: 2px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
        
        /* WIDGET STATS RAPIDES */
        .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .w-box { background: rgba(220,80,120,0.1); border: 1px solid var(--border); padding: 15px; border-radius: 15px; text-align: center; }
        .w-num { font-size: 1.5rem; font-weight: bold; color: var(--rose); }

        /* BARRES DE STATS */
        .bar-container { margin-top: 15px; }
        .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .bar-bg { flex: 1; background: #222; height: 14px; border-radius: 7px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; transition: width 0.8s ease-out; }
        .bar-val { position: absolute; right: 8px; top: 0; font-size: 10px; font-weight: bold; line-height: 14px; }

        input, textarea { width: 100%; box-sizing: border-box; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-family: inherit; }
        .cat-toggle { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .btn { background: linear-gradient(135deg, var(--rose), #9b5de5); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-del { color: #ff4d4d; background: none; border: 1px solid rgba(255,77,77,0.2); padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<nav class="nav">
    <div style="font-size: 1.8rem; margin-bottom: 30px;">✨</div>
    <button class="tab active" id="btn-ajouter" onclick="showTab('ajouter')">➕<span class="tab-label">Ajout</span></button>
    <button class="tab" id="btn-stats" onclick="showTab('stats')">📊<span class="tab-label">Stats</span></button>
    <button class="tab" id="btn-historique" onclick="showTab('historique')">📋<span class="tab-label">Hist.</span></button>
</nav>

<main class="main">
    <div class="widget-grid">
        <div class="w-box"><div class="w-num" id="wMois">-</div><div style="font-size:0.7rem">Ce mois-ci</div></div>
        <div class="w-box"><div class="w-num" id="wEcart">-</div><div style="font-size:0.7rem">Jours d'écart</div></div>
    </div>

    <div id="tab-ajouter">
        <div class="card">
            <h2 style="margin-top:0; font-size: 1.2rem;">Nouvelle Entrée</h2>
            <input type="date" id="dateInput">
            <div id="catList">
                <label class="cat-toggle"><input type="checkbox" value="relation"> ❤️ Relation</label>
                <label class="cat-toggle"><input type="checkbox" value="fellation"> 💋 Fellation</label>
                <label class="cat-toggle"><input type="checkbox" value="pegging"> 🔥 Pegging</label>
            </div>
            <textarea id="noteInput" placeholder="Une petite note ?"></textarea>
            <button class="btn" onclick="ajouterEntree()">Enregistrer</button>
        </div>
    </div>

    <div id="tab-stats" style="display:none">
        <div class="card">
            <h2 style="margin-top:0; font-size: 1.2rem;">Tes Statistiques</h2>
            <div id="barChart" class="bar-container"></div>
        </div>
    </div>

    <div id="tab-historique" style="display:none">
        <div id="historiqueContainer"></div>
    </div>
</main>

<script>
    // INITIALISATION
    const firebaseConfig = {
        apiKey: "AIzaSyAOGyrBGK_K2Sl_sJ3Y8ZwF9Z9hE0I7Vwk",
        databaseURL: "https://carnet-intime-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "carnet-intime"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    firebase.auth().signInAnonymously();

    const CATS = {
        relation: { emoji: '❤️', label: 'Relation', color: '#dc5078' },
        fellation: { emoji: '💋', label: 'Fellation', color: '#f4a24a' },
        pegging: { emoji: '🔥', label: 'Pegging', color: '#9b5de5' }
    };

    let allData = [];

    // ECOUTE FIREBASE
    db.ref('journal').on('value', snap => {
        allData = [];
        snap.forEach(c => { allData.push({...c.val(), key: c.key}); });
        allData.sort((a, b) => b.date.localeCompare(a.date));
        updateUI();
    });

    function updateUI() {
        renderWidget();
        renderStats();
        renderHistorique();
    }

    function showTab(t) {
        ['ajouter', 'stats', 'historique'].forEach(id => {
            document.getElementById('tab-'+id).style.display = (id === t) ? 'block' : 'none';
            document.getElementById('btn-'+id).classList.toggle('active', id === t);
        });
        window.scrollTo(0,0);
    }

    function ajouterEntree() {
        const date = document.getElementById('dateInput').value;
        const note = document.getElementById('noteInput').value;
        const cats = [...document.querySelectorAll('#catList input:checked')].map(i => i.value);

        if(!date || cats.length === 0) return alert("Date et catégorie obligatoires !");

        db.ref('journal').push({ date, cats, note }).then(() => {
            document.getElementById('noteInput').value = "";
            document.querySelectorAll('#catList input').forEach(i => i.checked = false);
            showTab('historique');
        });
    }

    function renderWidget() {
        if(allData.length > 0) {
            const currentMois = new Date().toISOString().substring(0,7);
            document.getElementById('wMois').textContent = allData.filter(e => e.date.startsWith(currentMois)).length;
            
            const lastDate = new Date(allData[0].date);
            const diff = Math.floor((new Date() - lastDate) / 86400000);
            document.getElementById('wEcart').textContent = diff + "j";
        }
    }

    function renderStats() {
        const counts = { relation: 0, fellation: 0, pegging: 0 };
        allData.forEach(e => e.cats?.forEach(c => counts[c]++));
        
        const max = Math.max(...Object.values(counts), 1);
        document.getElementById('barChart').innerHTML = Object.keys(counts).map(k => `
            <div class="bar-row">
                <div style="font-size:1.2rem">${CATS[k].emoji}</div>
                <div class="bar-bg">
                    <div class="bar-fill" style="width:${(counts[k]/max)*100}%; background:${CATS[k].color}"></div>
                    <span class="bar-val">${counts[k]}</span>
                </div>
            </div>
        `).join('');
    }

    function renderHistorique() {
        const container = document.getElementById('historiqueContainer');
        if(allData.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">Aucun souvenir encore...</div>';
            return;
        }
        container.innerHTML = allData.map(e => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <div style="font-weight:bold; font-size:1.1rem;">${new Date(e.date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'})}</div>
                        <div style="margin: 8px 0;">${e.cats.map(c => CATS[c].emoji).join(' ')}</div>
                        <div style="font-size:0.9rem; opacity:0.8; line-height:1.4;">${e.note || ''}</div>
                    </div>
                    <button class="btn-del" onclick="if(confirm('Supprimer ?')) db.ref('journal/${e.key}').remove()">Suppr.</button>
                </div>
            </div>
        `).join('');
    }

    // Date par défaut = aujourd'hui
    document.getElementById('dateInput').value = new Date().toISOString().substring(0,10);
</script>
</body>
</html>
