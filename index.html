<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mon Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root {
  --bg: #0a0812; --surface: #110f1a; --surface2: #1a1628;
  --border: rgba(255,255,255,0.07); --text: #f2eaf8;
  --text-dim: #7a6e8a; --rose: #dc5078; --violet: #9b5de5; --nav-w: 72px;
}

/* LE FIX SCROLL */
html, body { overflow-y: auto !important; height: auto !important; min-height: 100vh; margin: 0; background: var(--bg); color: var(--text); }
body { font-family: 'DM Sans', sans-serif; display: flex; }

.nav {
  width: var(--nav-w); background: var(--surface); border-right: 1px solid var(--border);
  position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; padding: 20px 0;
}

.main { flex: 1; margin-left: var(--nav-w); padding: 20px 18px 120px; position: relative; }

.tab {
  width: 52px; height: 52px; background: transparent; border: none; color: var(--text-dim);
  border-radius: 14px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
}
.tab.active { background: rgba(220,80,120,0.2); color: #f07898; border: 1px solid rgba(220,80,120,0.3); }

.widget {
  background: linear-gradient(135deg, rgba(220,80,120,0.1), rgba(155,93,229,0.1));
  border: 1px solid rgba(220,80,120,0.2); border-radius: 20px; padding: 16px; margin-bottom: 20px;
}
.widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.widget-stat { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid var(--border); }
.widget-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--rose); }
.widget-phrase { 
  background: rgba(220,80,120,0.1); border-left: 3px solid var(--rose); 
  padding: 12px; border-radius: 8px; font-style: italic; font-size: 0.85rem; text-align: center; 
}

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 15px; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-bg { flex: 1; background: #222; height: 14px; border-radius: 7px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; transition: width 0.8s ease-out; }
.bar-count { position: absolute; right: 8px; top: 0; font-size: 10px; font-weight: bold; line-height: 14px; }

.btn { background: linear-gradient(135deg, var(--rose), var(--violet)); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }
input, textarea { width: 100%; box-sizing: border-box; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-family: inherit; }
.cat-toggle { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
</style>
</head>
<body>

<nav class="nav">
  <div style="font-size: 1.5rem; color: var(--rose); margin-bottom: 25px;">♡</div>
  <button class="tab active" id="btn-ajouter" onclick="showTab('ajouter')">➕</button>
  <button class="tab" id="btn-stats" onclick="showTab('stats')">📊</button>
  <button class="tab" id="btn-historique" onclick="showTab('historique')">📋</button>
</nav>

<main class="main">
  <div class="widget">
    <div class="widget-grid">
      <div class="widget-stat"><div class="widget-num" id="wEcart">-</div><div style="font-size:0.55rem">Écart</div></div>
      <div class="widget-stat"><div class="widget-num" id="wMois">-</div><div style="font-size:0.55rem">Mois</div></div>
      <div class="widget-stat"><div class="widget-num" id="wMoyenne">-</div><div style="font-size:0.55rem">Moyenne</div></div>
      <div class="widget-stat"><div class="widget-num" id="wTotal">-</div><div style="font-size:0.55rem">Total</div></div>
    </div>
    <div class="widget-phrase" id="wPhrase">Chargement...</div>
  </div>

  <div id="tab-ajouter">
    <div class="card">
      <input type="date" id="dateInput">
      <div id="catList">
        <label class="cat-toggle"><input type="checkbox" value="relation"> ❤️ Relation</label>
        <label class="cat-toggle"><input type="checkbox" value="fellation"> 💋 Fellation</label>
        <label class="cat-toggle"><input type="checkbox" value="pegging"> 🔥 Pegging</label>
      </div>
      <textarea id="noteInput" placeholder="Note..."></textarea>
      <button class="btn" onclick="ajouterEntree()">Enregistrer</button>
    </div>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="card"><h3>Répartition</h3><div id="barChart"></div></div>
  </div>

  <div id="tab-historique" style="display:none">
    <div id="historiqueContainer"></div>
  </div>
</main>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAOGyrBGK_K2Sl_sJ3Y8ZwF9Z9hE0I7Vwk",
  databaseURL: "https://carnet-intime-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "carnet-intime"
});
const db = firebase.database();
firebase.auth().signInAnonymously();

const CATS = {
  relation: {emoji:'❤️', label:'Relation', color: '#dc5078'},
  fellation: {emoji:'💋', label:'Fellation', color: '#f4a24a'},
  pegging: {emoji:'🔥', label:'Pegging', color: '#9b5de5'}
};

let allData = [];

db.ref('journal').on('value', snap => {
  allData = [];
  snap.forEach(c => { allData.push({...c.val(), key: c.key}); });
  allData.sort((a,b) => b.date.localeCompare(a.date));
  renderAll();
});

function showTab(t) {
  ['ajouter', 'stats', 'historique'].forEach(id => {
    document.getElementById('tab-'+id).style.display = (id === t) ? 'block' : 'none';
    document.getElementById('btn-'+id).classList.toggle('active', id === t);
  });
}

function ajouterEntree() {
  const date = document.getElementById('dateInput').value;
  const note = document.getElementById('noteInput').value;
  const cats = [...document.querySelectorAll('#catList input:checked')].map(i => i.value);
  if(!date || cats.length === 0) return alert("Date et catégorie !");
  db.ref('journal').push({date, cats, note}).then(() => {
    document.getElementById('noteInput').value = "";
    document.querySelectorAll('#catList input').forEach(i => i.checked = false);
    showTab('historique');
  });
}

function renderAll() {
  if(allData.length > 0) {
    document.getElementById('wTotal').textContent = allData.length;
    document.getElementById('wMois').textContent = allData.filter(e => e.date.startsWith(new Date().toISOString().substring(0,7))).length;
    const diff = Math.floor((new Date() - new Date(allData[0].date)) / 86400000);
    document.getElementById('wEcart').textContent = diff + "j";
    
    // LA PHRASE RIGOLOTE
    let p = "";
    if(diff === 0) p = "Aujourd'hui ? Quelle santé ! 🔥";
    else if(diff < 3) p = "On garde le rythme, c'est bien. 😏";
    else if(diff < 7) p = "Ça commence à faire long, non ? 🙄";
    else p = "Alerte sécheresse ! Il faut agir. 🏜️";
    document.getElementById('wPhrase').textContent = p;

    const months = [...new Set(allData.map(e => e.date.substring(0,7)))].length;
    document.getElementById('wMoyenne').textContent = (allData.length / (months || 1)).toFixed(1);
  }

  const counts = { relation: 0, fellation: 0, pegging: 0 };
  allData.forEach(e => e.cats?.forEach(c => counts[c]++));
  const max = Math.max(...Object.values(counts), 1);
  document.getElementById('barChart').innerHTML = Object.keys(counts).map(k => `
    <div class="bar-row">
      <div style="font-size:1.1rem">${CATS[k].emoji}</div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${(counts[k]/max)*100}%; background:${CATS[k].color}"></div>
        <span class="bar-count">${counts[k]}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('historiqueContainer').innerHTML = allData.map(e => `
    <div class="card">
      <div style="display:flex; justify-content:space-between">
        <b>${e.date}</b>
        <button onclick="if(confirm('Supprimer ?')) db.ref('journal/${e.key}').remove()" style="color:red; background:none; border:none; cursor:pointer">🗑️</button>
      </div>
      <div style="color:var(--rose); margin:10px 0">${e.cats.map(c => CATS[c].emoji).join(' ')}</div>
      <div style="font-size:0.9rem; opacity:0.8">${e.note || ''}</div>
    </div>
  `).join('');
}
document.getElementById('dateInput').value = new Date().toISOString().substring(0,10);
</script>
</body>
</html>
