<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mon Journal</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root {
  --bg: #0a0812; --surface: #110f1a; --surface2: #1a1628;
  --border: rgba(255,255,255,0.07); --text: #f2eaf8;
  --text-dim: #7a6e8a; --rose: #dc5078; --nav-w: 72px;
}

/* --- FIX SCROLL --- */
html, body {
  overflow-y: auto !important;
  height: auto !important;
  min-height: 100vh;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  margin: 0;
  overflow-x: hidden;
}

.nav {
  width: var(--nav-w); background: var(--surface); border-right: 1px solid var(--border);
  position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; padding: 20px 0;
}

.main {
  flex: 1; margin-left: var(--nav-w); padding: 20px 18px 100px;
  position: relative;
}

.tab {
  width: 52px; height: 52px; background: transparent; border: none; color: var(--text-dim);
  border-radius: 14px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
}
.tab.active { background: rgba(220,80,120,0.2); color: #f07898; border: 1px solid rgba(220,80,120,0.3); }

.widget {
  background: linear-gradient(135deg, rgba(220,80,120,0.1), rgba(155,93,229,0.1));
  border: 1px solid rgba(220,80,120,0.2); border-radius: 20px; padding: 16px; margin-bottom: 20px;
}
.widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.widget-stat { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid var(--border); }
.widget-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--rose); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
.btn { background: linear-gradient(135deg, var(--rose), #9b5de5); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
input, textarea { width: 100%; box-sizing: border-box; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
.cat-toggle { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
</style>
</head>
<body>

<nav class="nav">
  <div style="font-size: 1.5rem; color: var(--rose); margin-bottom: 25px;">♡</div>
  <button class="tab active" id="btn-ajouter" onclick="showTab('ajouter')">➕</button>
  <button class="tab" id="btn-stats" onclick="showTab('stats')">📊</button>
  <button class="tab" id="btn-historique" onclick="showTab('historique')">📋</button>
</nav>

<main class="main">
  <div class="widget">
    <div class="widget-grid">
      <div class="widget-stat"><div class="widget-num" id="wEcart">-</div><div style="font-size:0.6rem">Dernier écart</div></div>
      <div class="widget-stat"><div class="widget-num" id="wMois">-</div><div style="font-size:0.6rem">Ce mois-ci</div></div>
    </div>
  </div>

  <div id="tab-ajouter">
    <div class="card">
      <input type="date" id="dateInput">
      <div id="catList">
        <label class="cat-toggle"><input type="checkbox" value="relation"> ❤️ Relation</label>
        <label class="cat-toggle"><input type="checkbox" value="fellation"> 💋 Fellation</label>
        <label class="cat-toggle"><input type="checkbox" value="pegging"> 🔥 Pegging</label>
      </div>
      <textarea id="noteInput" placeholder="Note..."></textarea>
      <button class="btn" onclick="ajouterEntree()">Enregistrer</button>
    </div>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="card"><h3>Stats par catégorie</h3><div id="catStats"></div></div>
  </div>

  <div id="tab-historique" style="display:none">
    <div id="historiqueContainer"></div>
  </div>
</main>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(() => console.log("SW OK"));
}

firebase.initializeApp({
  apiKey: "AIzaSyAOGyrBGK_K2Sl_sJ3Y8ZwF9Z9hE0I7Vwk",
  databaseURL: "https://carnet-intime-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "carnet-intime"
});
const db = firebase.database();
firebase.auth().signInAnonymously();

const CATS = {
  relation: {emoji:'❤️', label:'Relation'},
  fellation: {emoji:'💋', label:'Fellation'},
  pegging: {emoji:'🔥', label:'Pegging'}
};

let allData = [];

db.ref('journal').on('value', snap => {
  allData = [];
  snap.forEach(c => { allData.push({...c.val(), key: c.key}); });
  allData.sort((a,b) => b.date.localeCompare(a.date));
  renderAll();
});

function showTab(t) {
  ['ajouter', 'stats', 'historique'].forEach(id => {
    document.getElementById('tab-'+id).style.display = (id === t) ? 'block' : 'none';
    document.getElementById('btn-'+id).classList.toggle('active', id === t);
  });
}

function ajouterEntree() {
  const date = document.getElementById('dateInput').value;
  const note = document.getElementById('noteInput').value;
  const cats = [...document.querySelectorAll('#catList input:checked')].map(i => i.value);
  if(!date || cats.length === 0) return alert("Date et catégorie !");
  db.ref('journal').push({date, cats, note}).then(() => {
    document.getElementById('noteInput').value = "";
    document.querySelectorAll('#catList input').forEach(i => i.checked = false);
    showTab('historique');
  });
}

function renderAll() {
  renderWidget();
  renderStats();
  renderHistorique();
}

function renderWidget() {
  if(allData.length > 0) {
    document.getElementById('wMois').textContent = allData.filter(e => e.date.startsWith(new Date().toISOString().substring(0,7))).length;
    const last = new Date(allData[0].date);
    const diff = Math.floor((new Date() - last) / 86400000);
    document.getElementById('wEcart').textContent = diff + "j";
  }
}

function renderStats() {
  const counts = { relation: 0, fellation: 0, pegging: 0 };
  allData.forEach(e => e.cats?.forEach(c => counts[c]++));
  document.getElementById('catStats').innerHTML = Object.keys(counts).map(k => `
    <div style="display:flex; justify-content:space-between; margin-bottom:5px">
      <span>${CATS[k].emoji} ${CATS[k].label}</span>
      <span style="font-weight:bold">${counts[k]}</span>
    </div>
  `).join('');
}

function renderHistorique() {
  document.getElementById('historiqueContainer').innerHTML = allData.map(e => `
    <div class="card">
      <div style="display:flex; justify-content:space-between">
        <span style="font-weight:bold">${e.date}</span>
        <button onclick="db.ref('journal/${e.key}').remove()" style="color:red; background:none; border:none; cursor:pointer">🗑️</button>
      </div>
      <div style="color:var(--rose); margin:5px 0">${e.cats.map(c => CATS[c].emoji).join(' ')}</div>
      <div style="font-size:0.85rem; opacity:0.8">${e.note || ''}</div>
    </div>
  `).join('');
}

document.getElementById('dateInput').value = new Date().toISOString().substring(0,10);
</script>
</body>
</html>
